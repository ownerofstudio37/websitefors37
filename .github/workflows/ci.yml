name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-placeholder
      SUPABASE_SERVICE_ROLE_KEY: service-role-placeholder
      SITE_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start site
        run: |
          npm start > /tmp/studio37-next.log 2>&1 &
          echo $! > /tmp/studio37-next.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/studio37-next.log
          exit 1

      - name: Validate sitemap endpoints
        run: npm run test:sitemap

      - name: Stop site
        if: always()
        run: |
          if [ -f /tmp/studio37-next.pid ]; then
            kill "$(cat /tmp/studio37-next.pid)" || true
          fi
