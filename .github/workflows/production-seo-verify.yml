name: Production SEO Verify

on:
  workflow_dispatch:
  schedule:
    - cron: '17 13 * * *'

jobs:
  verify-production-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live SEO endpoints
        env:
          SITE_URL: https://www.studio37.cc
        run: npm run verify:seo
